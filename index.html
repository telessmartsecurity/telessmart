<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teles Smart Security</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1a3a6b;
      --steel: #5a7a9a;
      --slate: #4a5568;
      --light-steel: #8aaac8;
      --bg: #0b1622;
      --bg2: #0f1e2e;
      --surface: rgba(26, 58, 107, 0.12);
      --border: rgba(90, 122, 154, 0.25);
      --text: #e8eef5;
      --text-muted: #8aaac8;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      font-family: 'Barlow', sans-serif;
      color: var(--text);
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(90,122,154,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(90,122,154,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow orb */
    body::after {
      content: '';
      position: fixed;
      top: -180px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 500px;
      background: radial-gradient(ellipse, rgba(26,58,107,0.55) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      gap: 0;
    }

    /* Header */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-bottom: 40px;
      animation: fadeDown 0.7s ease both;
    }

    .logo-wrap {
      width: 200px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .brand h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-align: center;
      color: #fff;
      line-height: 1;
    }

    .brand h1 span {
      color: var(--light-steel);
      font-weight: 500;
    }

    .tagline {
      font-size: 13px;
      font-weight: 300;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: center;
      margin-top: 6px;
    }

    /* Divider */
    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--steel), transparent);
      margin: 0 auto 40px;
      animation: fadeIn 0.7s 0.3s ease both;
    }

    /* Links */
    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 400px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 24px;
      border-radius: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      backdrop-filter: blur(8px);
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.6s ease both;
    }

    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(26,58,107,0.3), transparent 60%);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .link-btn:hover {
      transform: translateY(-2px);
      background: rgba(26,58,107,0.28);
      border-color: rgba(90,122,154,0.5);
      box-shadow: 0 8px 32px rgba(26,58,107,0.3);
    }

    .link-btn:hover::before { opacity: 1; }

    .link-btn:nth-child(1) { animation-delay: 0.35s; }
    .link-btn:nth-child(2) { animation-delay: 0.45s; }
    .link-btn:nth-child(3) { animation-delay: 0.55s; }

    .btn-icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .btn-icon svg { width: 22px; height: 22px; }

    .btn-icon.whatsapp { background: rgba(37,211,102,0.15); }
    .btn-icon.whatsapp svg { fill: #25d366; }

    .btn-icon.instagram { background: rgba(225,48,108,0.12); }
    .btn-icon.instagram svg { fill: url(#ig-grad); }

    .btn-icon.email { background: rgba(90,122,154,0.18); }
    .btn-icon.email svg { fill: var(--light-steel); }

    .btn-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
      position: relative;
      z-index: 1;
    }

    .btn-label {
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #fff;
    }

    .btn-sub {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 300;
      letter-spacing: 0.02em;
    }

    .btn-arrow {
      margin-left: auto;
      color: var(--border);
      font-size: 18px;
      position: relative;
      z-index: 1;
      transition: transform 0.2s ease, color 0.2s ease;
    }

    .link-btn:hover .btn-arrow {
      transform: translateX(4px);
      color: var(--light-steel);
    }

    /* Footer */
    .footer {
      margin-top: 44px;
      text-align: center;
      animation: fadeIn 0.7s 0.7s ease both;
    }

    .footer p {
      font-size: 11px;
      color: rgba(138,170,200,0.4);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @media (max-width: 480px) {
      .brand h1 { font-size: 22px; }
      .logo-wrap { width: 90px; height: 100px; }
    }
  </style>
</head>

    // Try to load the actual logo - fallback to text if unavailable
    const logo = document.getElementById('logo');
    logo.onerror = function() {
      const wrap = logo.parentElement;
      wrap.innerHTML = `<svg viewBox="0 0 60 60" width="60" height="60">
        <rect x="8" y="4" width="18" height="6" rx="2" fill="#5a7a9a"/>

    };

  </script>
</body>
